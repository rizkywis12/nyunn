<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajakan Makan Sore ☕</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource/inter@4.5.0/index.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%);
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .details {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-item .emoji {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }

        .detail-item .text {
            text-align: left;
        }

        .detail-item .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .detail-item .value {
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 80px;
            padding: 10px;
        }

        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-mau {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
            z-index: 5;
            position: relative;
        }

        .btn-mau:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(233, 69, 96, 0.6);
        }

        .btn-tolak {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.25);
            z-index: 60;
            user-select: none;
            position: fixed;
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.3s ease,
                        font-size 0.3s ease,
                        padding 0.3s ease;
        }

        .btn-tolak:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .acceptance-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        .acceptance-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .acceptance-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
            padding: 20px;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .acceptance-content .big-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        .acceptance-content h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 12px;
        }

        .acceptance-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            max-width: 300px;
        }

        .confetti {
            position: fixed;
            top: -10px;
            z-index: 101;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        .heart {
            position: fixed;
            font-size: 20px;
            animation: floatUp 3s ease-out forwards;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
        }

        .hint-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="icon">🌅</div>
        <h1>Yuk, Makan Sore!</h1>
        <p class="subtitle">Ada yang mau ngajak kamu nih~</p>

        <div class="details">
            <div class="detail-item">
                <div class="emoji">📅</div>
                <div class="text">
                    <div class="label">Tanggal</div>
                    <div class="value">Senin, 29 Juni 2026</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">📍</div>
                <div class="text">
                    <div class="label">Lokasi</div>
                    <div class="value">Cafe Delapa</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🕐</div>
                <div class="text">
                    <div class="label">Waktu</div>
                    <div class="value">Sore - Jam 7 Malam</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🍽️</div>
                <div class="text">
                    <div class="label">Aktivitas</div>
                    <div class="value">Makan & Ngobrol</div>
                </div>
            </div>
        </div>

        <div class="buttons" id="buttonArea">
            <button class="btn btn-mau" id="btnMau" onclick="accept()">💖 Mau</button>
            <button class="btn btn-tolak" id="btnTolak">Tolak</button>
        </div>

        <p class="hint-text">* Tombol tolak agak pemalu 😄</p>
    </div>

    <div class="acceptance-overlay" id="overlay">
        <div class="acceptance-content">
            <div class="big-emoji">🎉</div>
            <h2>Yeayy! Makasih ya!</h2>
            <p>Udah ditunggu di Cafe Delapa, Senin 29 Juni 2026! Sampai ketemu~ ✨</p>
        </div>
    </div>

    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            starsContainer.appendChild(star);
        }

        // Dodge button logic
        const btnTolak = document.getElementById('btnTolak');
        const btnMau = document.getElementById('btnMau');
        let dodgeCount = 0;
        let hasStartedRunning = false;

        function dodgeButton(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            
            dodgeCount++;

            const btnRect = btnTolak.getBoundingClientRect();
            const btnWidth = btnRect.width;
            const btnHeight = btnRect.height;

            // First time: switch to fixed positioning based on current position
            if (!hasStartedRunning) {
                hasStartedRunning = true;
                btnTolak.style.left = btnRect.left + 'px';
                btnTolak.style.top = btnRect.top + 'px';
            }

            // Get cursor position
            let cursorX = 0;
            let cursorY = 0;
            
            if (event && event.clientX !== undefined) {
                cursorX = event.clientX;
                cursorY = event.clientY;
            } else if (event && event.touches && event.touches[0]) {
                cursorX = event.touches[0].clientX;
                cursorY = event.touches[0].clientY;
            }

            // Batasi area pergerakan: hanya di dalam viewport dengan margin aman
            // Margin besar agar tombol tidak pernah keluar layar
            const safeMargin = 60;
            const maxX = window.innerWidth - btnWidth - safeMargin;
            const maxY = window.innerHeight - btnHeight - safeMargin;
            const minX = safeMargin;
            const minY = safeMargin;

            // Calculate new position away from cursor
            let newX, newY;
            let attempts = 0;
            const minDistance = 150;
            
            do {
                newX = Math.random() * (maxX - minX) + minX;
                newY = Math.random() * (maxY - minY) + minY;
                attempts++;
                
                const distFromCursor = Math.sqrt(
                    Math.pow(newX + btnWidth/2 - cursorX, 2) + 
                    Math.pow(newY + btnHeight/2 - cursorY, 2)
                );
                
                if (distFromCursor > minDistance || attempts > 30) {
                    break;
                }
            } while (attempts < 30);

            // Clamp posisi agar 100% dalam viewport (dengan safety margin lebih besar)
            newX = Math.max(minX, Math.min(newX, maxX));
            newY = Math.max(minY, Math.min(newY, maxY));

            btnTolak.style.left = newX + 'px';
            btnTolak.style.top = newY + 'px';

            // Add rotation (kecil saja agar tidak keluar bounds)
            const rotation = (Math.random() - 0.5) * 15;
            btnTolak.style.transform = `rotate(${rotation}deg)`;

            // Change text
            const texts = [
                'Tolak',
                'Yakin? 🥺',
                'Jangan dong~',
                'Kabuuur! 💨',
                'Ga bisa di klik!',
                'Hehehe~ 😝',
                'Nyerah aja deh',
                'Pencet Mau aja 💕',
                'Masih kabur~',
                'Capek kan? Mau aja 🥹'
            ];

            btnTolak.textContent = texts[Math.min(dodgeCount, texts.length - 1)];

            // Make "Mau" button bigger
            const scale = 1 + (dodgeCount * 0.06);
            btnMau.style.transform = `scale(${Math.min(scale, 1.6)})`;
            btnMau.style.transition = 'transform 0.3s ease';

            // Make tolak button smaller
            const tolakScale = Math.max(1 - (dodgeCount * 0.04), 0.55);
            btnTolak.style.fontSize = `${16 * tolakScale}px`;
            btnTolak.style.padding = `${14 * tolakScale}px ${36 * tolakScale}px`;
        }

        // Add event listeners
        btnTolak.addEventListener('mouseenter', dodgeButton);
        btnTolak.addEventListener('touchstart', dodgeButton);
        btnTolak.addEventListener('click', dodgeButton);

        // Track mouse for proximity dodge
        document.addEventListener('mousemove', (e) => {
            if (!hasStartedRunning) return;
            
            const btnRect = btnTolak.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;

            const distX = e.clientX - btnCenterX;
            const distY = e.clientY - btnCenterY;
            const distance = Math.sqrt(distX * distX + distY * distY);

            if (distance < 90) {
                dodgeButton(e);
            }
        });

        // Accept action
        function accept() {
            const overlay = document.getElementById('overlay');
            overlay.classList.add('show');
            createConfetti();
            createHearts();
        }

        function createConfetti() {
            const colors = ['#e94560', '#ff6b6b', '#ffd93d', '#6bcf7f', '#4ecdc4', '#a855f7'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.width = Math.random() * 10 + 5 + 'px';
                    confetti.style.height = Math.random() * 10 + 5 + 'px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        function createHearts() {
            const hearts = ['💖', '💕', '✨', '🎉', '💗', '🥰'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.bottom = '0';
                    heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                    heart.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(heart);

                    setTimeout(() => heart.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
